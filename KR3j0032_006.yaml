body:
  text: 靖康緗素雜記卷六宋黃朝英撰猗嗟元度確論云猗倚也若曰猗嗟昌兮猗重較兮猗與漆沮猗與那與皆中有所倚而生歎也至于猗彼女桑乃以謂采而薪之則不可以言倚而猗之義不通矣故經義以謂承彼女桑而猗之乃所以為倚蓋詩人所記適其條桑之事而已其論誠工然説猗重較兮以猗為嘆辭恐于義未安蓋亦不詳考舒王經義而誤為之説也淇奧義云猗倚也重較者所以為愼固也猗自訓倚而以為中有所倚而生嘆豈其誤歟免爰古語云麞無膽兔無脾鴇無舌其説信然何以知其如此按字説云赤與白為章麞見章而惑者也以此知其無膽脾屬土土主信故詩以兔爰刺桓王之失信以此知其無脾舌所以通語言無舌則無所告訴矣故詩以鴇羽刺君子下從征役不得養其父母以此知其無舌又許愼注淮南子云反舌百鳥舌也能反易其聲以效百鳥之鳴也無聲者五月陽氣極于上微隂起于下百舌無隂故無聲也説貓雜俎云貓目睛旦暮圓及午豎斂如綖其鼻端常冷唯夏至日暖沈存中嘗論歐陽公曽得一古畫牡丹叢其下有一貓未知其精粗丞相吳正肅一見曰此正午牡丹也何以明之其花披哆而色正燥此日中時花也貓眼黑睛如線此正午貓眼也有帶露花則房斂而色澤貓眼朝暮則睛圓逐漸狹長正午則如一線耳正肅公雖曰善求古人之意然説貓處往往亦自於段氏云武敏詩生民篇云履帝武敏歆攸介攸止新傳云武足迹也敏拇也拇謂之敏者行能先人故也乃引爾雅云履帝武敏敏拇也列子曰后稷生乎巨迹蓋所謂帝武敏者巨迹之拇也薑嫄履巨迹之拇以祀郊禖之神助嚳祭事事成而止則當以履帝武敏為斷句歆字連下句讀之乃為允當今學者皆讀為履帝武敏歆殊無義旨不然則爾雅所引何不連歆字邪芍藥握椒附先儒説詩溱洧刺亂也其詩卒章言贈之以勺藥以為男淫女蓋勺藥破血令人無子贈之以勺藥者所以為男淫女也又東門之詩疾亂也其詩卒章言貽我握椒以為女淫男蓋椒氣下達用以養陽貽我握椒者所以為女淫男也其説雖近乎鄙俚然頗得詩人之深意故志之太史史記太史公自序云談為太史公又云太史公既掌天官不治民有子曰遷遷生龍門又云太史公留滯周南不得與從事故發憤且卒又云太史公執遷手而泣曰余先周室之太史也豫死汝必為太史無忘吾所欲論著矣凡此以上所稱太史公者皆謂司馬談也又按本傳云太史公曰先人有言自周公卒五百嵗而有孔子又云太史公與上大夫壺遂對答又云太史公曰唯唯否否又云七年而太史公遭李陵之禍凡此以上所稱太史公者謂司馬遷也又文選報任少卿書云太史公牛馬走司馬遷再拜言五臣注曰太史遷之父走僕也言已為太史公牛馬之僕蓋自卑之辭也又案孝武本紀云有司與太史公祠官寬舒等議韋昭注曰説者以談為太史公失之矣史記稱遷為太史公者是外孫楊惲所稱余嘗考之史記自序前所指司馬談為太史公者蓋遷之辭也後所指司馬遷為太史公者蓋後人所定也案漢儀注太史公武帝置位在丞相上後宣帝以其官為令行太史公文書而已而臣瓉又曰百官表無太史公司馬談但以太史丞為太史令余案班固郊祀志曰有司與太史令談班彪略論曰孝武之世太史令司馬遷則談遷父子相繼為太史公明矣自序亦曰太史公仍父子相續纂其職又云司馬氏世主史官故雖為令而皆可以公稱之也遷尊其父故呼談為太史公後人又尊遷故呼遷為太史公蓋所稱公者如周公召公太公廷尉吳公謁者僕射鄧公四皓有園公夏黃公之類是也非必是其外孫所稱韋昭乃以司馬談為非太史公又以遷為太史公者是楊惲所稱誤也石鼓倦遊雜録云古之石刻存于今者唯石鼓也本露處于野司馬池待制知鳳翔日輦置於府學之門廡下外以木櫺護之其石質堅頑類今人為碓磑者古篆刻缺可辨者幾希歐陽論石鼓元在岐陽初不見稱於前世至唐人始盛稱之而韋應物以為周文王之鼓至宣王刻詩爾韓退之直以為宣王之鼓在今鳳翔孔子廟中鼓有十先時散棄于野鄭餘慶置于廟而亡其一皇祐四年向傳師求於民間得之十鼓乃足其文可見者四百八十五磨滅不可識者過半余所集録文之古者莫先於此然其可疑者三四今世所有漢桓靈時碑往往尚見在距今未及千嵗大書深刻而磨滅者十猶八九此鼓案太史公年表自宣王共和元年至今嘉祐八年實千有九百一十四年鼓文細而刻淺理豈得存此其可疑者一也其字古而有法其言與雅頌同文而詩書所傳之外三代文章真迹在者唯此而已然自漢以來博古好奇之士皆略而不道此其可疑者二也隋氏藏書最多其志所録秦皇帝刻石婆羅門外國書皆有而獨無石鼓遺近録逺不宜如此此其可疑者三也前世所傳古逺奇怪之事類多虛誕而難信況傳記不載不知韋韓二君何據而知為文宣之鼓也隋唐古今書籍粗備豈當時猶有所見而今不見之耶然退之好古不妄者余姑取以為信耳至於字畫亦非史籕不能作也慮囚漢書何武傳云武為揚州刺史行部録囚又雋不疑為京兆尹每行縣録囚徒還其母輒問有所平反活幾何人顔師古注云省録之知其情狀有寃滯與不也今云慮囚本録聲之去者耳音力具反而近俗不曉其意訛其文為思慮之慮失其源矣又案後漢盧延傳云帝乃臨御道之館親録囚徒又張奮傳云和帝幸洛陽獄録囚徒又漢百官志云諸州常以八月巡行所部郡國録囚徒胡廣凡縣邑囚徒皆閲録視參考辭狀有侵究者即時平理也又應奉為郡決曹史行部四十二縣録囚徒數百十人又北史太和四年帝親録囚徒二十年幸華林園親録囚徒隋開皇二年親録囚徒前漢書及南北史皆謂之録囚徒而新唐書本紀云甲午慮囚或云癸亥慮囚或以旱慮囚或遣使慮免汝州輕繫皆以録為慮余案太玄云蹛于狴獄三嵗見録集韻云録音良倨切寬省也蓋唐亦循襲舊史語言以録為慮未之改耳顔氏所謂近俗不曉其意訛其文為思慮之慮蓋指唐人言也故劉餗嘉話稱高祖平京師李靖見收太宗慮囚見靖引與語奇之又王涯説通作慮此唐人用慮字之明驗也靖康緗素雜記卷六
