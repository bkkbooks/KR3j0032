body:
  text: 靖康緗素雜記卷九宋黃朝英撰馬嵗司馬温公考異云張萬嵗掌國馬唐統紀云萬嵗三代典羣牧恩信行隴右故隴右人謂馬嵗為齒為張氏諱也案公羊傳晉獻公謂荀息曰吾馬之齒亦已長矣然則謂馬嵗為馬齒有自來矣豈為張氏諱哉格五漢吾丘夀王以善格五召待詔注云格五簺也説文曰行棊相塞謂之簺鮑宏簺經曰簺有四采塞白乗五是也乗五至五即格不得行故云格五簺先代反又世俗有蹙融之戲謂以奕局取一道人各行五棊即所謂格五也唐資暇集謂融宜作戎此戲生於黃帝蹙鞠意在軍戎也殊非圓融之義又引庾元威著著座右方所言蹙戎者即今之蹙融也其説甚佳然謂生於黃帝蹙鞠則又誤矣案漢書枚臯傳云蹵鞠刻鏤又霍去病傳云尚穿域躢鞠顔師古注云鞠以韋為之中實以毛蹵躢為戲樂也則蹙鞠非蹙融明矣案西京雜記云漢成帝好蹙鞠羣臣以蹙鞠為勞體非至尊所宜帝曰朕好之可擇似而不勞者奏之家君作彈棊以獻又唐薛嵩好蹙鞠劉鋼勸止之曰為樂甚衆何必乗危邀頃刻之歡皆謂蹙鞠為勞動則明知非蹙戎也今人又以蹙鞠為擊鞠盖蹵擊一也沈存中乃以擊鞠為擊木毬子故謂與蹵鞠異反以為傳寫之誤非也故唐書所載但云擊毬不謂之鞠其義甚明餳粥劉夢得嘉話云為詩用僻字須有來處宋考功詩云馬上逢寒食春來不見餳徐盈切甞疑此字因讀毛詩鄭箋説吹簫處云即今賣餳人家物六經唯此注中有餳字後輩業詩即須有據不可學常人率焉而道也又本朝宋子京寒食詩云草色引開盤馬路簫聲吹暖賣餳天其亦用鄭箋吹簫賣餳之義然詞致騷雅勝考功逺矣余常攷嘉話所載春來不見餳云是宋考功詩比因閲沈雲卿詠驩州不作寒食詩云嶺外無寒食春來不見餳洛陽新甲子何日是清明花柳爭朝發軒車滿路迎帝鄉遥可念腸斷報親情是時沈謫驩州故有是詩但未見宋全篇耳考其詞意似是雲卿之詩盖沈宋俱仕武后朝故所傳容有訛謬所未詳也李義山詩云粥香餳白杏花天省對流鶯坐綺筵又宋子京途中清明詩云漠漠輕花著早桐客甌餳粥對禺中寒食清明多用餳粥事儲胥揚雄甘泉賦云近則洪崖旁皇儲胥努阹又長楊賦云木雍槍纍以為儲胥呂延濟云槍纍作木槍相纍為柵也蘇林注云木擁柵其外又以竹槍纍為外儲也顔師古云儲峙也胥須也以木擁槍及纍繩連結以為儲胥言有儲蓄以待所須也漢武帝作儲胥館故李義山詩云風雲長為護儲胥宋子京傷孟昭圖云密疏叩儲胥又侍宴云秋色遍儲胥又思歸老云至今三籍在儲胥又荅朱彭州云九番官樹老儲胥又續春詞云蒼龍驅暖入儲胥盖儲胥猶言皇居也不必云有儲蓄以待所胥也故張平子西京賦云既新作於迎風加露寒與儲胥又沈約應敎詩云南瞻儲胥觀西望昆明池又南史武帝諸子傳檄云偃師南望無復儲胥露寒河陽北臨或有穹廬氈帳西京賦注云武帝先作迎風館後加露寒儲胥二館名讖歸田録云宋鄭公庠初名郊字伯庠與其弟祁自布衣時名動天下號為二宋其為知制誥仁宗驟加奬眷便欲大用有忌其先進者譖之謂其姓符國號名應郊天又曰郊音交交者替代之名也宋交其言不祥仁宗遽命改之公怏怏不獲己乃改為庠字公序公後更踐二府二十餘年以司空致仕兼享福夀而終而譖者竟不見用以卒可以為小人之戒也又西清詩話云宋元憲公始拜内相同列譖其姓宋而郊名非便公奉詔更名庠意殊怏怏不滿會用新名移書葉道卿乃呼同年葉戲荅公曰清臣宋郊牓第六中選徧閲小録無宋庠者不知何許人公因寄一絶自解云紙尾勤勤問姓名禁林依舊玷華纓莫驚書録題臣向只是當時劉更生又楊文公談苑云太平興國四年北戎寇邊車駕幸大名府方渡河有人持手版邀乗輿前驅斥之號呼道旁自言獻封事太宗令接取視之乃臨河主簿宋捷上甚喜即以為將作監此乃以姓名盜爵禄者也此與元憲公姓同而事異良可嗤笑江為江南野録載江為者宋世淹之後先祖仕于建陽因家焉世習儒素少游廬山白鹿洞師事處士陳貺酷好詩句居二十餘年有風雅清麗之態所載此而已余觀南史淹傳字文通濟陽考城人宋少帝時黜為建安吳興令終於梁天監中左衞將軍子蒍嗣又案吳均傳云先是有濟陽江洪工屬文為建陽令坐事死案江洪齊時為太學生竟陵王子良開西邸招文學時王僧孺與太學生虞義丘國賔蕭文琰丘令楷江洪劉孝孫以善辭藻游焉而僧孺與高平徐夤俱為學林則洪仕於齊梁間明矣淹與洪其系皆出於濟陽考城而又俱仕於齊梁間淹甞為建安令其後它遷洪為建陽令而死於建陽則江為之系實出於洪益明矣而野録云宋世淹之後又云先祖仕于建陽因家焉彼乃不敢别白言之盖未甞見吳均傳所載江洪之事乃妄臆度而為之説也房喬沈存中甞謂予家有閻博陵畫唐秦府十八學士各有眞賛名字與史所載不同或以字為名或書名而不書字者其論甚美然謂房眞齡字喬年舊史乃云房喬字眞齡既而云唐書成于後人之手所傳容有訛謬甚非也末云以舊史考之魏鄭公對太宗曰目如懸鈴者佳則眞齡果名非字也何其謬歟盖所謂懸鈴者乃鈴鐸之鈴而眞齡乃年齡之齡唯其為年齡之齡故字以喬年此理甚明而存中乃不之省何也然房梁公名字大抵不同眞賛云房眞齡字喬皆未詳也又韓愈集中有王𢎞中神道碑云諱𢎞中字某案實録新舊傳皆名仲舒字𢎞中愈又作燕喜亭記稱為王𢎞中然則𢎞中必字也碑文誤耳政與房喬名字一同高陽太史公記沛公引兵過陳留酈生踵軍門上謁曰高陽賤民酈食其時沛公方洗謂使者曰言我方以天下為事未暇見儒人也酈生瞋目按劒叱使者曰走復入言沛公吾高陽酒徒也非儒人也沛公遽雪足杖矛曰延客入又世説載季倫每臨習郁池未甞不大醉常曰醉我高陽池也㐮陽小兒為之歌曰山公時一醉逕造高陽池劉義慶云高陽池在㐮陽案史記及漢書食其本傳稱食其陳留高陽人也又云沛公略地陳留郊使人召食其食其至入謁則高陽在陳留明矣又案晉書載簡鎭㐮陽時諸習有佳園池簡每出游之池上置酒輒醉名之曰高陽池然則㐮陽習池謂之高陽池者盖取酈生高陽酒徒之義也靖康緗素雜記卷九
