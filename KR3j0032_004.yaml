body:
  text: 靖康緗素雜記卷四宋黃朝英撰濌伯音沓家訓云晉羊曼常頽縱任俠飲酒誕節兖州號為濌伯此字更無音訓梁張纘呼為嚃羮之嚃亦不知所出但耆老相傳世間又有濌濌語蓋無所不施無所不容之意也顧野王玉篇誤為黑旁沓顧雖博物猶出張纘之下顔氏云吾所見數本並無作黑者重沓是多饒積厚之意從黑更無義旨故唐常衮窒賣官之路一切以公議格之非文辭者皆擯不用世謂之濌伯以其濌濌無賢不肖之辨云蓋兖州之遺意也三鱣漢書楊震傳云有冠雀銜三鱣當作鱓魚飛集講堂前注云冠音􅔏即􅔏雀也鱣音善其字借為鱣鮪之鱣俗因謂之鱣知然反案郭璞注爾雅鱣長二三丈又魏武四時食制云鱣魚大如五斗奩長一丈餘安有􅔏雀能致一者況三頭乎鱣又純灰色無文章鱓魚長不過三尺大不過三指黃地黑文故都講云蛇鱣者卿大夫服之象也數三者法三台也孫卿云魚鱉鰌鱣說苑曰鱣似蛇並作鱣字蓋假鱣為鱓其來久矣又杜少陵云敇厨唯一味求飽或三鱣又以平聲押之恐誤也阿堵猶今人言這箇也晉王夷甫雅尚口未嘗言錢一日其妻令以錢繞牀使不得行夷甫晨起見錢閡行謂婢曰舉阿堵物去其措意如此世之學者有賢愚類求阿堵之義而未之得殊不知阿堵初自無據作史者但記一時語言而已顧愷之傳亦云傳神寫照正在阿堵中獨不見此何耶宋景文公寫真詩云誰謂彼己子而傳阿堵神又答書詩云久謝輪囷器羞言阿堵神皆用此也豈有它義撑犁後漢南胸奴傳云單于姓虛連題注云前書胸奴傳曰單于姓攣鞮氏其國稱之曰撑黎孤塗單于胸奴謂天為撑黎謂子為孤塗單于者廣大之貌也言其象天單于然也一云撑犂天子也胸奴號撑犂猶漢人稱天子也與此小異永叔代王狀元謝及第啓云陸機閲史尚靡識於撑犂枚臯屬文徒率成於骫骳又沈元用謝啓云讀撑犂而靡識敢謂知書問祈招而不知尚慙博學然陸機不識撑犂事竟不知在何書一云不識撑犂謂皇甫謐非陸機招提唐會昌五年七月上都東都兩街各寺留僧三十人節度諸州各一寺三等七年八月毁招提蘭若四萬餘品余案會要云大厯二年薛平奏請賜中條山蘭若額為大和寺蓋官賜額者為寺私造者為招提蘭若杜牧杭州南亭記所謂山臺野邑是也人日西清詩話云都人劉克者窮該典籍之事多從之質嘗注杜子美詩元日到人日未有不隂時人知其一不知其二唯杜子美與克會耳起就架上取書示之東方朔占書也嵗後八日一日雞二日犬三日豕四日羊五日牛六日馬七日人八日穀其日晴所主之物育隂則災少陵意謂天寶離亂四方雲擾幅裂人物嵗嵗俱災此豈春秋書王正月意邪深得古人用心如此又案宗凛荆楚嵗時記云正月七日謂之人日採七種菜以為羮剪綵為人或鏤剪金薄為人以貼屏風亦戴之頭鬢求之經典罕有此事唯魏東平王倉為安仁峰銘云正月元七厥日惟人乘我良駟陟彼安仁載在名集此為證矣又北史魏收傳云魏帝宴百寮問何故名人日皆莫能知收曰晉議郎董勛答問禮俗云正月一日為雞二日為狗三日為猪四日為羊五日為牛六日為馬七日為人然東方朔占書有八日為穀而魏收所引董勛之語止及於七日何邪然安仁峰銘所用亦云七日為人而宗凛指此為證蓋宗凛又未嘗見東方朔占書而妄為之說也唯劉克為博學余嘗觀沈存中筆談亦以為士人劉克按夔州圖經辨烏鬼事甚詳而西清詩話又美其窮該典籍真奇士也唐李義山人日詩云文王喻復今朝是子晉吹笙此日同舜格有苗旬太逺周稱流火月難窮鏤金作勝傳荆俗剪綵為人起晉風獨有道衡詩思苦離家恨得二年中曲水晉武帝嘗問摯虞三日曲水之義虞曰漢章帝時徐肇以三月初生三女至三日俱亡村人以為怪乃招携之水濵洗祓遂因水以泛觴其義起此帝曰必如所言便非好事束晢進曰臣請言之昔周公城洛邑因流水以泛酒故逸詩云羽觴隨波流又秦昭王以三日置酒河曲見金人奉水心之劒曰令君制有西夏乃霸諸矦因此立為曲水二漢相沿皆為盛集帝大悅又韓詩曰鄭國之俗三月上巳之日於溱洧二水之上招魂續魄執蘭草祓除不祥上巳即三日也曲水者引水環曲為渠以流酒杯而行焉漢書八月祓霸水亦斯義也又荆楚嵗時記云案詩曰溱與洧方渙渙兮士與女方秉蕳兮注云今三月桃花水下以招魂續魄祓除氛穢並其義也元魏孝文帝還洛引見王公侍臣於清徽堂因之流化渠帝曰此曲水者取乾道曲成萬物無滯風俗通曰周禮女巫掌嵗時以祓除疾病後漢志云是月上巳官民皆潔於東流水上曰洗濯祓除去宿垢疢為大潔一說云後漢有郭虞者三月上巳産二女三日中並不育俗以為大忌至此月日人家皆於東流水為祈禳自潔濯謂之禊祠引流行觴遂成曲水劉昭注云郭虞之說良為虛誕假有庶民旬內失其兩女何足驚彼風俗稱為世忌乎杜篤乃稱王矦公主暨于富商用事伊雒帷幔𤣥黃本傳大將軍梁商亦歌泣於雒禊也自魏時不復用三日水宴之禮著朔嘗怪世俗題梁記其年月及所為祭文稱月朔乃用月建殊可嗤笑假如甲辰嵗正月初一庚戌朔初十日己未俗乃云丙寅朔殊不知正月斗當建寅而所謂丙寅者即月建也習非承誤每每如此蓋不考古之過也余嘗觀漢書律厯志載周公攝政五年後二嵗得周公七年復子明辟之嵗是嵗二月乙亥朔己丑望後六日得乙未故召誥曰惟二月既望粵六日乙未又其三月甲辰朔三日丙午召誥曰惟三月丙午朏又云成王元年正月己巳朔此命伯禽俾侯于魯之嵗又成王十年四月庚戌朔十五日甲子哉生魄故顧命曰惟四月哉生魄又云康王十一年六月戊辰朔三日庚午故畢命豐刑曰惟十有二年六月庚午朏春秋書桓公三年秋七月壬辰朔日有食之鼓用牲于社又莊公二十五年六月辛未朔日有食之凡此所記月朔何嘗用月建乎其餘史傳及唐韓柳之文與本朝先達士大夫文集未嘗謬用一處蓋得孔子作春秋著朔之遺法也羅疇老書義云古之紀事者日之可也必曰朏曰望曰旁死魄曰哉生明曰哉生魄何也蓋月有小大故紀事者每志此以謹晦朔也先儒謂猶今之人將言日必先言朔蓋得之矣余觀博平王安世作白氏六帖敘末云元祐五年嵗次庚午二月己卯朔初一日丙申此正用月建也殊可嗤笑祖道周禮太馭掌王玉路以祀及祀軷注云軷祀者封土象山於路側以芻棘柏為神主祭之以車轢軷而去詩云取羝以軷祖道之禮蓋封土為軷壇也漢疏廣傳云公卿大夫故人邑子設祖道供張東都門外注云祖道餞行也供居共反張竹亮反劉屈氂傳云丞相為祖道送至渭橋又景十三王傳云榮行祖於江陵北門注云祖者送行之祭因設燕飲焉顔師古云祖者送行之祭因饗飲也昔黃帝之子纍祖好逺游而死於道故後人以為行神也又後漢荀彧傳云彧死帝哭之祖日為之廢燕樂注云祖日謂祭祖神之日因為燕樂也應劭風俗通曰案禮傳云共工氏之子曰修好逺游舟車所至足跡所達靡不窮覽故祀以為祖神漢以午日祖又案字說祖從示從且後所神事方來有繼行神謂之祖者祭於行始方來有繼之意余案左氏傳云五行之官是謂五官實列受氏姓封為上公祀為貴神重為勾芒該為蓐收修及熙為𤣥冥犂為祝融勾龍為后土蓋祭必有神以主之故祖祭必用一神以為祖神也所謂方來有繼者特言其意義如此耳然陳寵傳注云昔共工之子好游嵗終死為祖神荀彧傳注云共工氏之子曰修好逺游故祀以為祖神而顔氏又云昔黃帝之子纍祖好逺游而死於道故後人以為行神三家之論自不同如此膢臘揚子曰不膢臘也歟注云膢八月旦也今河東俗奉以為大節祭祀先人也臘蠟也玉篇云膢力矦切飲食祭也冀州八月楚俗二月臘力盍切說文云冬至後三戌為臘祭百神也案禮記外傳云蠟祭即臘祭也夏曰清暑殷曰嘉平周謂之蠟祭秦曰臘黃衣黃冠而祭休息田夫也既蠟而後臘又云蠟與臘二祭也案史記始皇本紀始皇三十一年十二月更名臘曰嘉平注云先是其邑謡歌曰神仙得者茅初成帝若學之臘嘉平父老具言此神仙之謡歌勸帝求長生之術於是始皇乃欣然有尋仙之意因改臘曰嘉平則與外傳所載不同風俗通云夏曰嘉平殷曰清祀周曰大蠟漢曰臘此云秦曰臘蓋漢仍之也余謂史遷不當有誤然史記外傳乃後人所集故錯亂其名號竊意殷曰臘秦曰嘉平乃為允當隋開皇中改周十二月為臘蠟又白氏六帖云夏曰嘉平殷曰清祀周曰大蠟漢改為臘注云夏曰嘉平出史記六案史記六所云始皇十二月始更名臘曰嘉平即非夏后祭名疑六帖為誤靖康緗素雜記卷四
