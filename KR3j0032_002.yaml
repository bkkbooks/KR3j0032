body:
  text: 靖康緗素雜記卷二宋黃朝英撰隂康漢書載相如游獵賦云奏陶唐氏之舞聽葛天氏之歌注云陶唐當為隂康傳寫之誤耳案古今人表有葛天氏隂康氏又呂氏春秋曰昔隂康氏之時民氣鬱遏筋骨不達故作為舞以宣導之高誘亦誤解為陶唐堯有天下之號也案吕氏說隂康之後方一一厯言黃帝顓頊帝嚳乃及堯舜作樂之序皆有次第豈再陳堯而錯亂其序乎蓋誘不觀古今人表妄改易吕氏本文耳余案書傳之訛非特此也如却非訛而為御北皮傳訛而為頗傳華表訛而為和東者其類甚多伎養應劭風俗通嘗論太史公記高漸離變名易姓為人庸保匿作於宋子久之作苦聞其家堂上有客擊筑伎養不能無出言案伎養者謂懷其伎而腹癢也是以潘嶽射雉賦亦云從心煩而伎養李善云有伎藝欲逞曰伎養今史記並作倣徨不能去每出言曰彼有善有不善或作徘徊不能無出言是為俗傳寫誤也故景文公詩云技癢新禽百種啼蓋用此義鄭重漢王莽傳稱非皇天所以鄭重降符命之意注云鄭重猶言頻煩也顔氏家訓亦云吾亦不能鄭重聊舉近世切要以啓寤汝耳此真得漢書之意近沈存中筆談言石曼卿事云他日試使人通鄭重則閉門不納亦無應門者即以鄭重為殷勤不知何所據而言然不爾曾謂使人通頻煩可乎魏志倭人傳云使知國家哀汝故鄭重賜汝好物也亦有頻煩之意今人有以鄭重者又誤矣回紇舊唐書回紇傳云元和四年里迦可汗遣使請改為回鶻義取回旋輕捷如鶻崔鉉續會要云貞元五年七月公主至衙帳回紇使李義進請改紇字為鶻與統紀同鄴矦家傳云四年七月可汗上表請改紇字為鶻與李繁北荒君長録及新回鶻傳同按李泌明年春薨若明年七月方改家傳不應言之今從家傳君長録書扊扅顔氏家訓云古樂府歌百里奚詞曰百里奚五羊皮憶别時烹伏雌吹扊扅今日富貴忘我為家訓謂吹當作炊煮之炊案蔡雍月令章句曰鍵開牡也所以止扉或謂之剡移然則當時貧困并以門牡木作薪炊耳扊或作扂余染反扅或作扈余之反故何公送人序云話龍具之注歌扊扅之炊昔人述懷詩云囊空未省餘叉釧薪盡何嘗赦扊扅藉田藉田音慈夜反典籍音慈力反案舒王字說藉從草從來從借從草若藉用白茅是也凡藉物如之從來從借若藉而不稅是也凡藉人如之藉物者尚之藉人者下焉籍從昔從來從竹藉記昔事有實可利後除其繁蕪有節焉世之學者類不分藉籍之義乃以藉田為籍田至書典籍之籍乃反為藉字是不究其本也案文帝紀詔曰農天下之本其開籍田朕親率耕以給宗廟粢盛應劭曰古者天子耕籍田千畝為天下先籍者帝王典籍之常韋昭曰藉借也借民力以治之以奉宗廟且以勸率天下使務農也臣瓉曰藉謂蹈藉也藉田本以躬親為義不得以假借為稱師古曰國語云宣王不藉千畝虢文公諫斯則藉非假借明矣余考數家之說應劭以藉為典籍之籍謬也唯韋昭之說得之案王制曰古者公田藉而不稅注云借民力治公田故不稅蓋帝王所親耕者公田也公田謂之藉田者以借民力為義故藉之字所以從借也舒王云公田謂之鋤猶親耕之田謂之藉也宣王不藉千畝者為其不能親耕公田以勸農耳謂之藉者豈不以假借為義乎臣瓉與師古未之或知何耶余嘗謂枕藉醖藉狼藉顧藉皆從草音慈夜反而文籍圖籍篇籍與夫籍甚籍其家皆從竹音慈力反乃為允當又許愼說文云祭藉也一曰草不編狼藉從草藉聲慈夜切又秦昔切許氏乃以一字為兩音尤見疏謬重黎楚世家云楚之先祖出自帝顓頊高陽高陽生稱稱生卷章卷章生重黎重黎為高辛氏火正命曰祝融其後誅重黎而以其弟吳回為重黎後復居火正為祝融案左氏春秋傳載蔡墨論社稷五祀木正曰勾芒火正曰祝融金正曰蓐收水正曰𤣥冥土正曰后土杜氏注云正官長也木生勾曲而有芒角其祀重焉祝融明貌其祀黎焉該為金正修及熙為水正勾龍為土正又案蔡墨云少皥氏有四叔曰重曰該曰修曰熙實能金木及水使重為勾芒該為蓐收修及熙為𤣥冥世不失職遂濟窮桑此其三祀也顓頊氏有子曰黎為祝融共工氏有子曰勾龍為后土此其二祀也左傳以重為少皥氏之叔以黎為顓頊氏之子則重與黎二人也而太史公乃以重犂為一人而謂重犂為顓頊之曾孫與左氏所載不同蓋太史公去上古之世為差逺則所傳容有謬戾不若左氏之為近故所載為詳且悉也又況高辛氏承顓頊高陽氏之後高陽氏黃帝之孫高辛氏黃帝之曾孫世次差近故顓頊之子犂所以為高辛氏之火正也若以犂為顓頊之曾孫則與高辛氏世次相逺豈復為其火正乎案律厯志云火正犂同地幽通賦云犂醇耀於高辛皆其證也又許愼注淮南子云祝融顓頊之孫老童之子吳回也一名犂為高辛氏火正一云老童即卷章也案楚世家云犂先為祝融其後吳回代之則許愼之說又誤矣湯餅煮麵謂之湯餅其來舊矣案後漢梁冀傳云進鴆加煮餅世說載何平叔美姿容面至白魏文帝疑其傅粉夏月令食湯餅汗出以巾拭之轉皎白也又案吳均稱餅德曰湯餅為最又荆楚嵗時記云六月伏日並作湯餅名為辟惡又齊高帝好食水引䴵又唐書王皇后傳云獨不念阿忠脫紫半臂易斗麵為生日湯餅邪倦游雜録乃謂今人呼煮麵為湯餅誤矣懶真子録謂世之所謂長命麵即湯餅也恐亦未當余謂凡以麵為食具者皆謂之餅故火燒而食者呼為燒餅水瀹而食者呼為湯餅籠蒸而食者呼為蒸餅而饅頭謂之籠餅宜矣然張公所論市井有鬻胡餅者不曉名之所謂乃易其名為爐餅則又誤也案晉書云王長文在市中齧胡餅又肅宗實録云楊國忠自入市衣袖中盛胡餅安可易胡為爐也蓋胡餅者以胡人所常食而得名也故京都人轉音呼胡餅為胡餅呼骨切胡桃為胡桃亦呼骨切皆此義也余案資暇集論畢羅云蕃中畢氏羅氏好食此味因謂之畢羅後人加食旁為饆饠字非也又云元和中有姦僧鑒虛以羊之六腑特造一味傳之于今時人不得其名遂以其號目之曰鑒虛往往俗字又加食旁為􅀈􅀈字然則胡餅謂之胡義可知矣又玉篇從食從固為䭅字戶烏切注云餅也謂之䭅餅疑或出此余故併論使覽者得詳焉屬車胡廣漢制度曰天子出有大駕法駕小駕大駕則公卿奉引大將軍驂乘太僕御屬車八十一乘備千乘萬騎法駕公不在鹵簿唯河南尹執金吾洛陽令奉引侍中驂乘奉車郎御屬車三十六乘小駕太僕奉駕侍御史整車騎也又隋志云古者諸矦二車九乘秦滅九國兼其車服故為八十一乘漢遵不改武帝祠太乙甘泉則盡用之明帝上原陵又用之法駕三十六乘小駕十二乘隋開皇中大駕十二乘法駕減半大業初屬車備八十一乘煬帝問於閻毗毗曰此起於秦故張衡賦云屬車九九是也次及法駕三分減一為三十六乘此漢制也故文帝紀云奉天子法駕迎代邸如淳曰屬車三十六乘是也又據宋孝建時有司奏議晉遷江左唯設五乘尚書令建平王宏曰八十一乘議兼九國三十六乘無所准馮江左五乘儉不中禮但帝王旗旒之數爰及冕玉皆用十二今宜准此設十二乘平陳之後有司請以大駕依秦法駕依漢小駕依宋帝曰大駕宜用三十六法駕宜用十二小駕除之乾沒漢書張湯始為小吏乾沒與長安富賈田甲魚翁叔之屬交私服䖍曰乾沒射成敗也如淳曰豫居物以待之得利曰乾失利曰沒顔氏乾音干魏志傳嘏曰豈敢傾根竭本寄命洪流自徼於乾沒乎晉潘嶽與賈謐為草四友其母數誚之曰爾當知足而乾沒不已乎裴松之注魏志曰服䖍直以乾沒為射成敗而不說乾沒之義如淳以得利為乾失利為沒又不可了愚謂乾讀為乾燥之乾蓋謂有所徼射不計乾燥之與沉沒而為之也又蘇鶚演義云乾沒之說如陸沉之義陸沉者因陸沉之水也又曰陸地而沉不待在於水中也乾沒者言乾地而沒不待沉於江湖也故謂之乾沒隋書王劭贊云乾沒營利得不以道頽其家聲良可嘆息又隋蕭吉見上好徵祥之說欲乾沒自進遂矯其迹為悅媚焉又宋子京撰劉待制墓銘云財用既積官為簿受而吏得傍緣乾沒又葉府君行狀云民冒鹽權乾沒不悛靖康緗素雜記卷二
