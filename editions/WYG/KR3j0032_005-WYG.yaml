body:
  text: 靖康緗素雜記卷五宋黃朝英撰祖臘後漢陳寵傳云曾祖父咸成哀間以律令為尚書莽簒位謝病不仕時三子參豐欽亦令解官父子相與歸閉門不出猶用漢家祖臘人問其故咸曰我先人豈知王氏臘乎注云應劭風俗通曰昔共工之子好遊嵗終死為祖神漢家火行火盛於午故以午日為祖也臘者逺近祭衆神之名臘接也新故交接夫祭以報功也漢火行火衰於戌故臘用戌日也又案禮記外傳云漢則臘而不蜡受命之王皆以王日為祖衰日為臘又云周木德漢火德各以其五行之王日為祖其休廢日為臘也火王午木王卯水王子金王酉而臘各用其衰日如魏土行土衰於辰故魏臘用辰晉金行金衰於丑故晉臘用丑五運相承莫不皆然秦靜曰古禮出行有祖祭嵗終有蜡臘无正月必祖之祀正陽甞怪筆談論正陽為兩事正謂四月陽謂十月乃引日月陽止為證又謂先儒以日食正陽之月止謂四月為不然按爾雅月名十月為陽則謂十月為陽月可矣然以正陽為兩事誤也余考舒王字説云已正陽也无隂焉又詩七月新傳解四月秀葽處云四月正陽也秀葽言月何也秀葽以言隂生也隂始於四月生於五月而於四月言隂生者氣之先至者也又正月繁霜處云夏之四月謂之正月又詩義云此所言皆夏時者盖夏時據人所見所謂人正也由此觀之四月建巳之月巳為正陽則正陽止謂四月明矣存中之説可不攻而自破又案西京雜記云陽德用事則和氣皆陽建巳之月是也故謂之正陽之月又歐公歸田録云景祐六年日蝕四月朔以謂正陽之月自古所忌皆以四月為正陽之月其理甚明古昔或謂古與昔有以異乎余案書之堯典於堯之時稱昔於堯之前稱古則昔於古為近故日入至於星出亦謂之昔昔近故時變未甚殊也若之宜矣古逺則庸有稽焉故書於大誥言若昔朕其逝周官言若昔大猷微子之命言惟稽古崇德象賢周官言唐虞稽古此古昔之辨也又那之詩曰自古在昔先民有作新義引國語云古曰在昔昔曰先民言嘉客如此非適今也其所由來久矣然或謂之在昔或謂之昔在何也盖昔在者主其人而言之在昔者主其時而言之以人言之者謂其人昔在而今亡也以時言之者謂其在昔而非今也一説人雖往矣其流風遺烈猶在也故謂之昔在其時往矣其事必察而後見故謂之在昔烏鬼筆談甞論杜甫詩家家養烏鬼頓頓食黃魚世之説者皆不解其義唯士人劉克按夔州圖經稱峽中人謂鸕鷀為烏鬼蜀人臨水居者皆養鸕鷀繩繫其頸使之捕魚則倒提出之至今如此予在蜀中見人家養鸕鷀使捕魚信然但不知謂之烏鬼耳又按東齋記事云蜀之漁家養鸕鷀十數者日得魚可數十斤以繩約其吭纔通小魚大魚則不可食時呼而取出之乃復遣去甚馴狎指顧皆如人意有得魚而不以歸者則押羣者啄而使歸比之放鷹鶻無馳走之勞得利又差厚所載此而已然范蜀公亦不知鸕鷀乃老杜所謂烏鬼也案夷貊傳云倭國水多陸少以小鐶挂鸕鷀項令入水捕魚日得百餘頭則此事信然三伏漢郊祀志秦德公立二年卜居雍子孫飲馬於河遂都雍雍之諸祠自此興用三百羊於鄜畤作伏祠孟康云六月伏日也周時无至此乃有之顔師古曰伏者謂隂氣將起迫於殘陽而未得升故為藏伏因名伏日也立秋之後以金代火金畏於火故至庚日必伏庚金也謂金氣伏藏之日也又荆楚嵗時記案厯忌云四時代謝皆以相生立春木代水水生木立夏火代木木生火立秋金代火金畏火立冬水代金金生水故至庚日必伏庚者金也是月之雨田家以為甘澤邑里相賀名曰嘉雨穀雨嘉雨也曹植大暑賦云席季夏之二伏潘岳賦云初伏啟新節案隂陽書曰夏至後第三庚為初伏第四庚為中伏立秋後初庚為末伏端午李濟翁資暇集云端五者案周處風土記仲夏端五烹鶩角黍端始也謂五月初五日也今人多書午字其義無取焉余家元和中端五詔書並無作午字處而近見醴泉縣尉㕔壁有故光福王相題鄭泉記處云端午日豈三十年端午之義别有見邪所載此而已余案宗懔荆楚嵗時記引周處風土記云仲夏端午烹鶩角黍乃直用午字與濟翁所載不同以余意測之五與午字皆通盖五月建午或用午字何害於理余嘗效西崑體作端午詩云孟甞此日鍾英氣王鳳今朝襲慶源五色呈祥文必顯丙時先誕位非尊蘭湯備浴傳荆俗冰馬浮江弔屈魂却笑唐家公主騃預令馳驛剪祗洹為詩孔子曰人而不為周南召南其猶正墻面而立元澤謂為學始於詩詩始於二南其意以為為者殆猶老子之為學為道論語之為禮為樂之謂也沈存中筆談乃云周南召南樂名也胥鼓南以雅以南是也關睢鵲巢二南之詩而已有樂有舞焉學者之事其始也學周南召南未至于舞大夏大舞所謂為周南召南者不獨誦其詩而已何其牴牾耶案漢書王莽傳云初申屠建甞事崔發為詩顔師古注云就發學詩也然則班固亦以學詩為為詩則存中之説非經意明矣緑竹李濟翁甞論詩淇奥云菉竹猗猗按陸璣草木疏稱爾雅云菉王芻郭璞注云菉蓐也今呼為鴟脚莎或云即鹿蓐草也又爾雅云竹篇蓄注云似小棃赤莖節好生道旁可食亦作筑韓詩作􅗨音篤亦云􅗨篇竹則明知非笋竹矣今為辭賦皆引猗猗入竹事大誤也當時謝莊竹賛云瞻彼中唐緑竹猗猗便襲其謬殊乖理趣茍謝賛若佳何不預文選所以為昭明之棄也陸璣字從王旁非士衡者余按舒王新傳解緑竹云虚而節直而和疑當時亦指篇竹而云非笋竹也又任昉述異記云衛有淇園出竹在淇水之上詩云瞻彼淇奥菉竹猗猗是也又謂竹何耶遷鶯劉夢得嘉話云今謂進士登第為遷鶯者久矣葢自毛詩伐木篇云伐木丁丁鳥鳴嚶嚶出自幽谷遷於喬木又曰嚶其鳴矣求其友聲並無鶯字頃嵗省試早鶯求友詩又鶯出谷詩别書固无證據斯大誤也余謂今人吟咏多用遷鶯出谷事又曲名喜遷鶯者皆循襲唐人之誤也故宋景文公詩云曉報谷鶯朋友動又云杏園初日待鶯遷舒王云鶯猶尋舊友唯漢梁鴻東游作思友人詩曰鳥嚶嚶兮友之期念高子兮僕懐思南史劉孝標廣絶交論云嚶鳴相召星流電激是眞得毛詩之意踆鴟貨殖傳云吾聞岷山之下沃野下有踆鴟至死不饑云踆音蹲踆鴟謂芋也根可食以充糧故无饑年華陽國志曰都安縣有大芋如踆鴟也東坡云岷山之下凶年以蹲鴟為糧不復疫癘知此物之宜人也本草謂芋土芝益氣充肌余案大唐新語載東宫衛佐馮光震入院校文選解蹲鴟云今之芋子即是著毛蘿蔔也蕭嵩聞之撫掌大笑又案顔氏家訓云江南有一權貴讀誤本蜀都賦注解蹲鴟芋也乃為羊字人饋羊肉荅云捐惠蹲鴟舉朝驚駭尤可嗤笑靖康緗素雜記卷五
