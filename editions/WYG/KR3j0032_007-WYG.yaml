body:
  text: 靖康緗素雜記卷七宋黄朝英撰固桑新序云平公浮西河中流而歎曰嗟乎安得賢士與此樂者乎固桑進曰君言過矣夫劒産于越珠産江漢玉産崑山此三寶者皆無足而至平公曰固桑來吾門下食客三千人朝食不足暮收市租暮食不足朝收市租吾尚可謂不好士乎對曰今夫鴻鵠高飛冲天然其所恃者六翮耳夫腹下之毳背上之毛增去一把飛不為高下不知君之食客六翮邪將腹背之毛毳也平公黙然不應余案説苑云趙簡子游于西河而樂之嘆曰安得賢士而與處焉舟人古乗跪而對曰夫珠玉無足去此數千里而所以能來者人好之也今士有足而不能來者吾君其不好之乎簡子曰吾門左右客千人朝食不足暮收市征暮食不足朝收市征吾尚可謂不好士乎古乗對曰鴻鵠高飛逺翔其所恃者六翮也背上之毛腹下之毳無尺寸之數去之滿把飛不能為之益卑益之滿把飛不能為之益高不知門下左右客千人者有六翮之用乎將盡毛毳也案新序説苑皆劉向所撰也新序作平公説苑作趙簡子新序作固桑説苑作古乗何異同如此又説苑第一卷載楚文王爵筦饒事而新序文王作恭王筦饒作筦蘇又班固古人表云晋舩人固來顔師古曰即固乗也又爾不同何邪六璽蔡邕獨斷曰皇帝六璽皆玉螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子信璽天子之璽皆以武都紫泥封之又國璽譜曰傳國璽是秦始皇初并天下所刻其玉出藍田山丞相李斯所書其文曰受命于天既壽永昌高祖至霸上秦皇子嬰獻之至王莽簒位就元后求璽不與以威逼之乃出璽投地璽上螭一角缺及莽敗李松持璽詣宛上更始更始敗璽入赤眉劉盆子既敗以奉光武又西京雜記云中書以武都紫泥為璽室加緑綈其上又吳書云孫堅前入雒陽令人入井探得漢傳國璽方圓四寸上紐交玉龍上一角缺初黃門張譲等作亂天子出奔左右分散掌璽者以投井中袁術將僭號聞堅得璽乃拘堅夫人而奪之又太康初孫皓送金璽六枚案傳國璽不在六璽之數應氏漢官儀皇甫世紀其論六璽文義皆符漢官傳國璽文曰受命于天既壽且康且康永昌二字為錯不知二家何者為得吳時無能刻玉故天子以金為璽璽雖以金于文不異曩所得六璽者乃古人遺印不可施用也三臺李濟翁資暇集云今之啐酒三十拍促曲名三臺何如或曰昔鄴中有三臺石季倫常為游宴之地樂工倦怠造此以促飲也一説蔡邕自侍書御史累遷尚書三日之間周厯三臺樂府以邕曉音律製此説動邕心仰希其厚遺亦近之又劉公嘉話云人以三臺送酒盖因北齊高洋毁銅雀臺築三箇臺宫人拍手呼上臺因以送酒案魏武帝建安十四年冬作銅雀臺十八年九月作金虎臺古樂府云鑄銅為雀置于臺上因名焉又案北史齊文宣帝發三十餘萬人營三臺于鄴因其舊基而高博之大起宫室乃游豫焉至是三臺成改銅雀曰金鳳金虎曰聖應冰井曰崇光冬十一月登三臺御乾象殿朝宴羣臣則三臺所建舊矣但魏之冰井臺不知起自何年至北齊但因其故基而高博之耳嘉話乃云北齊高洋毁銅雀臺築三箇臺與北史所載不同以余意測之曲名三臺者盖因北齊營三臺以朝宴羣臣得名也厠牏漢書萬石君傳云竊問侍者取親中帬厠牏身自澣洒蘇林云牏音投賈逵解周官云牏行圊也孟康曰厠行圊牏中受黃函者東南人謂鑿木空中如槽謂之牏余案説文以牏為築墻短板度矦切而玉篇集韻以牏行圊字為从广从俞音投由是知中帬者謂其父之中衣也厠牏者謂其父圊溷之板也是二物者建親自澣洒以見事親孝謹如此而顔師古不從此説乃謂親身之小衫若今言汗衫是也果如顔氏之説則汗衫謂之厠牏有害于理而石建澣洒汗衫亦未足為孝謹之至也盖其義當如蘇林孟康之説故後人循襲所以謂如厠為厠牏其説良自于此余甞怪李濟翁資暇集云俗命如厠為屋頭稱并州人咸鑿土為室厠在所居之上故也一説北齊文宣帝怒其魏郡丞崔欽瓉以溷汁沃頭後人或食或避親長不能正言溷因影為沃頭焉盖濟翁當時著論亦不考究漢書厠牏之説但隨俗語謂為屋頭或云沃頭誤也樂部楊文公談苑載伶人王感化少聰敏未甞執卷而多識故實口諧捷急滑稽無窮會中主引李建勲嚴續二相游苑中適見繫牛于株枿上令感化賦詩應聲曰曽遭甯戚鞭敲角幾被田單火燎身獨向殘陽嚼枯草近來問喘更何人因以譏二相也又中主徙豫章潯陽遇大風中主不悦命酒獨酌指北岸山問舟人云皖公山愈不懌感化獨前獻詩曰龍舟萬里架長風漢武潯陽事正同珍重皖公山色好影斜不落夀杯中中主大悦賜束帛余讀江南野録載李家明事當嗣主時為樂部頭能滑稽善諷諫亦載二詩其詞大同小異詠牛詩曰曾遭甯戚鞭敲角又被田單火燎身閒背斜陽嚼枯草近來問喘更無人龍舟詩曰龍舟輕颭錦帆風正值宸遊望逺空回首皖公山色翠影斜不到夀杯中嗣主因慟俛首而過談苑以感化為建州人野録以家明為廬州人談苑謂中主野録謂嗣主未詳孰是寒鼈唐李濟翁甞論文選曹植樂府云寒鼈炙熊蹯李氏云今之湆肉謂之寒盖韓國事饌尚此法復引鹽鐵論羊淹雞寒劉熈釋名韓羊韓雞為證寒與韓同又李以上句云膾鯉臇胎鰕因注詩曰炰鼈膾鯉五臣兼見上句云膾遂改寒鼈為炰鼈以就毛詩之句又子建七啟云寒芳蓮之巢龜膾西海之飛鱗五臣亦改寒為搴搴取也何以對下句之膾邪況此篇全説修事之意獨入此搴字于理未安上句既改寒為搴即下句亦宜改膾為取縱一聨稍通亦與諸句不相承接以此言之明子建故用寒字豈可改為炰搴邪斯類篇篇有之學者幸留意所載此而已余觀荆楚嵗時記云雞寒狗熱厯兹承久乃引釋名云韓國之食又云崔植薄徒見史篇則作寒字語言錯亂竟未詳其旨意然以此考之益信其使寒字而五臣注解乃妄有改易明矣懼税南唐近事云金陵建國之初軍儲未實關市之利歛率尤繁農商苦之而莫達于上時属近甸亢旱日久祈禱無應上他日舉觴苑中宣示宰臣曰近京三五十里皆報雨足獨京城不雨何邪得非獄市之間寃枉未伸乎諸相未及對申漸高厯陛而進曰雨懼抽税不敢入京上因是悟之翊日下詔停一切額外税信宿之間膏澤告足故知優旃漆城那律瓦衣不為虚矣又江南野録載李家明從嗣主游後苑登于臺觀盛望鍾山雨曰其勢即至矣家明對曰雨雖來必不敢入城嗣主怪而問之家明曰懼陛下重税嗣主曰不因卿言朕不知之遂令榷務半而征之余甞攷二説大同小異然近事及國初野録以為嗣主近事謂申漸高野録謂李家明其不同如此孰謂書可信邪一麾筆談云今人守郡謂之建麾盖用顔延年詩一麾乃出守此誤也延年謂一麾者乃指麾之麾如武王右秉白旄以麾之麾非旌麾之麾也延年以阮始平詩云屢薦不入官一麾乃出守者山濤薦咸為吏部郎三上武帝不用後為荀朂一擠遂出始平故有此句延年被擯以此自託耳自杜牧為登樂游原詩云擬把一麾江海去樂游原上望昭陵始謬用一麾自此遂為故事凡此以上皆存中之語以余意測之杜樊川之意則善矣而謂之擬把則尤謬也盖自作太守而謂之一麾于理無礙但不可以此言贈人作太守耳宋景文公詩云使麾得請印垂要又云一封通奏領州麾又云乞得一麾行又云竟獲一麾行是眞得延年之意未甞謬用也靖康緗素雜記卷七
