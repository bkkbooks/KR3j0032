body:
  text: 靖康緗素雜記卷十宋黃朝英撰和松晉庾􅢺傳云􅢺有重名為縉紳所推而頗聚斂積實談者譏之都官從事溫嶠嘗劾奏􅢺􅢺更器嶠曰嶠森森如千丈松雖磊砢多節施之大厦有棟梁之用而溫嶠傳曰嶠為都官從事散騎常侍庾􅢺有重名而頗聚斂嶠舉奏之京都振肅蓋是時溫嶠為都官從事􅢺為散騎常侍二人同在朝廷是􅢺之所器者溫嶠非和嶠明矣及觀和嶠傳又云從事中郎庾􅢺見而嘆曰嶠森森如千丈松雖礧砢多節目施之大厦有棟梁之用而世説亦云子嵩目和嶠云云何其謬歟良由修史者雜出於諸儒而非一人之筆故其謬戾如此今之學者至有云和氏之松千丈益謬矣顔介北史載顔之推齊文宣時為黃門侍郎齊亡入周大象末為御史上士隋開皇中太子召為文學深見禮重尋以疾終而唐書又曰自高齊入周終隋黃門郎與北史所載不同北史云之推在齊有二子長曰思魯次曰敏楚蓋示不忘本也而唐書云師古父思魯以儒學顯武德初為秦王府記室參軍事又云師古叔遊秦武德初纍遷亷州刺史撰漢書決疑師古多資取其義又與北史不同南史載顔協二子之儀之推並早知名則之儀為長推為次明矣而北史載之推字介弟之儀字升則以之推為兄之儀為弟其不同又如此何耶貴學顔氏家訓云夫讀書之人自羲農以來宇宙之下凡識幾人凡見幾事世人不問愚智皆欲識人之多見事之廣而不肯讀書是猶求飽而懶營饌欲暖而惰裁衣也其説信然余案晉書虞嘯父仕孝武帝為侍中嘗侍飲宴帝從容問曰卿在門下初不聞有所獻替何耶嘯父家近海謂帝有所求對曰天時尚溫鰶魚蝦鮓未可致尋當有所尚獻帝大笑唐蘇良嗣高宗時為荆州刺史有河東寺本蕭察為兄河東王所建良嗣曰江漢間何與河東乎奏易之而當世恨其少學云又王元寶富而無學識嘗會賔客明日親友謂之曰昨日必多佳論元寶曰但費錦纒頭耳良可嗤笑刋詔晉書劉邈傳云時孝武帝觴樂之後多賜侍臣文辭詔義有不雅者邈輒焚毁之其它侍臣被詔或宣揚之故誦者以此多邈又徐邈傳云帝宴集酣樂之後好為手詔詩章以賜侍臣或文辭率爾所言穢雜邈輒應時收斂還省刋削皆使可觀經帝重覽然後出之是時侍臣被詔者或宣揚之故時議以此多邈夢筆梁江淹傳云淹嘗宿於冶亭夢一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可以見還淹便探懷中得五色筆一以授之爾後為詩絶無美句時人謂之才盡又紀少瑜嘗夢陸倕以一束青鏤管授之云我以此筆猶可用擇其善者其文因此遒進又唐李嶠為兒時夢人遺雙筆自是有文辭十五通五經薛元超稱之自梁至唐夢筆者凡三人今世為文辭者多以江氏為夢筆之裔然淹夢人取筆殆非佳語不知紀氏李氏亦自可稱夢筆之裔尤為佳也然蒙求注引典略云江淹少夢人授以五色筆因而有文章此一事又不載於本傳何耶甘羅史記甘羅者甘茂孫也茂既死甘羅年十二事秦相文信矦吕不韋後因説趙有功始皇封為上卿未嘗為秦相也世之人見其事秦相吕不韋因相傳以為甘羅十二為秦相大誤也唐資暇集又謂相秦者是羅祖名茂以史記考之又不然茂得罪於秦王亡秦入齊又使於楚楚王欲置相於秦范蜎以為不可故秦卒相向夀而茂竟不得復入秦卒於魏以此觀之則茂亦未嘗相秦也杜牧之偶題云甘羅昔作秦丞相其亦不考其實而誤為之説也金根劉公嘉話云昌黎生名父之子雖教有義方而性頗暗庸劣嘗為集賢校理史傳中有説金根處皆臆斷之曰豈其誤歟必金銀車也悉改根字為銀字至除拾遺果為諫院不受又大唐新語云張由古素無學術厯官臺省嘗於衆中嘆班固文章不入文選或謂之曰兩都賦燕山銘典引等並作文選中何云無由古曰此並班孟堅文章何關班固事聞者莫不絶倒枤杜枤音第舊唐書載明皇時宰相李林甫自無學術僅能秉筆有才名於時者尤忌之林甫典選部時選人嚴迥判語枤杜二字林甫不識謂吏部侍郎韋陟曰此謂杖杜何也陟俯首不敢言又太常少卿薑度妻誕子林甫手書慶之曰聞有弄麞之慶客視之掩口故東坡云甚欲去為湯餅客唯愁錯寫弄麞書蓋用此也惜乎新史不載其事靖康緗素雜記卷十
