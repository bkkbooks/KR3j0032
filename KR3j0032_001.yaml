body:
  text: 靖康緗素雜記卷一宋黃朝英撰黃閣天子曰黃闥三公曰黃閣給事舍人曰黃扉太守曰黃堂凡天子禁門曰黃闥以中人主之故號曰黃門令秦漢有給事黃門之職是也天子之與三公禮秩相亞故黃其閣以示謙漢舊儀云丞相聽事門曰黃閣又王瑩傳云既為公須開黃閣張敬兒謂其妻嫂曰我拜後府開黃閣是也黃門郎給事于黃闥之内入侍禁中後漢獻帝初置侍中給事黃門侍郎員各六人唐郭承嘏甞為給事中矣文宗謂宰臣曰承嘏久在黃扉是也黃堂者太守聽事之堂也亦謂之雌堂杜詩為南陽太守請郭丹為功曹勑以丹事編署黃堂以為後法是也或以大拜為身到黃扉余所未諭故杜少陵與嚴閣老詩云扈聖登黃閣明公獨妙年宋子京與王相公云薰琴順署雌閣偃藩又和公序再入玉堂云七年辤玉署再入佐黃扉與徐舍人云果紆繡扆之知趣上黃扉之試又初到郡齋云姑俟天藏疾雌堂日燕居又謝寄公醪云老依滴曲作蕃飲月例黃堂給宴醪又重修諸亭記云太守牙居惟有黃堂便坐則三公為黃閣給事舍人為黄扉太守為黄堂明矣蚩尾蘇鶚演義云蚩者海獸也漢武帝作栢梁殿有上疏者云蚩尾水之精能辟火災可置之堂殿今人多作鴟字顔之推亦作此鴟劉孝孫事始作此蚩尾既是水獸作蚩尤字是也蚩尤銅頭鐵額牛角牛耳獸之形也作鴟鳶字恐無意義古老傳云蚩聳尾出于頭上遂謂之蚩尾顔氏家訓云東宫舊事呼鴟尾為祠尾蓋張敞不甚稽古隨宜記注逐鄉俗訛謬取吳呼蚩為祠遂為祠尾又俗閭呼為鴟吻見其吻如鴟鳶遂以此呼之自後蚩字因有作此者余案倦游雜録云漢以宫殿多災術者言天上有魚尾星宜為其象冠于屋以禳之今亦有自唐以來寺觀舊殿宇尚有為飛魚形尾上指者不知何時易名為鴟吻狀亦不類魚尾又案陳書舊制三公黃閣㕔事置鴟尾後主時蕭摩訶以功授侍中詔摩訶開閤門施行馬㕔事寢堂並置鴟尾又北史宇文愷傳云自晋已前未有鴟尾用鴟字宋子京詩云久叨鴟尾三重閤兼撰新唐書皆用鴟字又江南野録云初臺殿閣各有鴟吻自乾德之後天王使至則去之使還復用至是遂除此又用鴟吻竟未詳其旨木稼舒王作韓魏公挽詩云木稼甞聞達官怕蓋用舊唐書寧王卧疾引諺語曰木稼達官怕必大臣當之吾其死矣此用故事誠工也然木稼之説齊世知其為木冰而不解其義余甞讀班史五行志而得其説蓋自春秋成公十六年雨木冰劉歆以為上陽施不下通下隂施不上達故雨而木為之冰雰氣寒木不曲直也劉向以為冰者隂之盛而水滯者也木者少陽貴臣卿大夫之象也此人將有害則隂氣脅木木先寒故得雨而冰也是時叔孫僑如出奔公子偃誅死一曰時晋執季孫行父又執公此執辱之異或曰今之長老名木冰為木介介者甲甲兵象也是嵗晋有鄢陵之戰楚王傷目而敗属常雨也由是知木稼當為木介明矣葢唐之諺語譌也案唐書五行志直書曰雨木冰乃引劉向之言為證又云亦謂之樹介介兵象也是眞得春秋書災異之意矣又公羊傳云雨木冰者何雨而木冰也何以書記異也何休云木者少陽幼君大臣之象冰者凝隂兵之類也冰脅木者君臣將執于兵之徵也然何氏此説葢亦自于歆向云夕郎職林曰初秦漢别有給事黃門之職後漢併為一官故有給事黃門侍郎余案漢舊儀曰黃門郎属黃門令每日暮入對青瑣門拜名曰夕郎亦謂之夕拜案劉公嘉話云崔造以夕郎拜相又南唐近事云相第有呼盧之會夕拜預焉盖謂唐鎬時為給事中也青瑣門在南宫衞瓘注吳都賦曰青瑣户邊青鏤也一曰天子門内有眉格再重裏青畫曰瑣案柳子厚云夕之名則朝拜之偶也古者旦見曰朝暮見曰夕詩曰邦君諸侯莫肯朝夕左傳曰百官承事朝而不夕記曰暮不廢夕又曰日入而夕晉矦將殺豎㐮叔向夕楚子之留乾谿右尹子革夕齊之亂子我夕趙文子礱其椽張老夕智㐮子為室美士茁夕皆暮見也漢儀夕則兩郎向瑣闈拜謂之夕郎亦出此名也又應劭注漢書云天子春朝日秋夕月朝日以朝夕月以夕又漢儀注郊泰畤皇帝平旦出竹宫東向揖日其夕西南向揖月顔氏云春朝朝日秋暮夕月此常禮也郊泰畤而揖日月此又别儀摭言云羅隱開平中累徴夕郎不起羅衮以詩贈之云向夕便思青瑣拜近年尋伴赤松遊孤負世之學者多以辠辜之辜為孤負之字殊乖禮意盖公正衆所附私反而孤焉衆所附則有相向之意故不孤私反而孤則有相背之意非向之也孤負云者言其背負而已故李陵與蘇武書云陵雖孤恩漢亦負德又云孤負陵心區區之意馬嚴上書云臣叔父援孤恩不報張俊上書云臣孤恩負義黃香上疏云孤忝聖恩謝莊月賦云孤奉明恩宋繇云孤負聖明謝晦云孤背天日桓榮祖云孤負恩奬江革云孤負朝廷北史后妃上云孤負遺旨隋宗室諸王傳云孤負付属李白云孤負夙願未甞用辜字今世先達士大夫亦未甞錯用如宋子京與李太𫝊云徒軫深仁有孤高誼又云敢忘自修以孤大賜舒王云安能孤此意顚倒就衰颯又云予豈敢孤其意以受不腆之辭魯直云誤䝉器使孤奉國恩則孤負之孤宜用孤字明矣耶􅟧前書云趙將李左車設伏兵之計以禦韓信而趙王不用遂為市中人耶􅟧之蘇鶚演義云耶􅟧者舉手相弄之貌即今俗謂之冶由也耶􅟧之葢音韻訛舛耳又後漢王霸傳王郎起兵光武在薊令霸至市中募人將以擊郎市人皆大笑舉手邪揄之注引説文曰歋􅟧手相笑也歋音弋支反􅟧音踰又音由此云邪揄語輕重不同又世説載襄陽羅友少好學性嗜酒當其所遇則不擇士庻桓宣武雖以才學遇之然以其誕率非宏逺才許而不用郡人有得郡者温為席送别友亦被命至尤遲晩溫問之答曰旦出門於中路逢一鬼大揶揄云我秪見汝送人作郡何以不見人送汝作郡遂慙悕却回不覺淹緩之罪桓雖知其滑稽心頗媿焉後以為襄陽太守故宋景文公詩云數領郡章君莫笑猶勝長被鬼揶􅀈塗詔舊唐書李藩傳曰王鍔以錢数十萬賂遺權倖求兼宰相權德輿在中書有密旨曰王鍔可兼宰相宜即擬來藩遂以筆塗兼宰相字却奏上云不可德輿失色曰縱不可宜别作奏豈可筆塗詔邪曰勢迫矣出今日便不可止日又暮何暇别作奏事果寢又案崔鉉會要曰此乃不諳故事者之妄傳史官之謬記耳既稱奉密旨宣擬狀中陳論固不假以筆塗詔矣凡欲降白麻若商量於中書門下皆前一日進文書然後付翰林草麻制又稱藩曰勢迫矣出今日便不可止尤為疎濶葢由史氏以藩有直亮之名欲委曲成其美豈所謂直筆哉舊唐書權徳輿𫝊曰初鍔來朝貴倖多舉鍔者上將加平章事李藩堅執以為不可德輿繼奏云云乃止今從之貌侵史記武安矦列傳云武安者貌侵韋昭注云侵音寢短小也又云醜惡也又漢本傳云蚡為人貌侵服䖍注云侵短小也韋昭則以侵為寢服䖍止讀如本字皆有短小之義而顔師古並無註釋余謂當以侵為正案酉陽雜俎云今人謂醜為貌寢誤也魏志曰劉表以王粲貌侵而體弱通侻不甚重也一云貌寢而體弱註云侵貌不足也又云貌寢謂貌負其實也通侻者簡易也侻他活切玉篇云輕也晉書載左思貌寢口訥而詞藻壯麗唐書載歐陽詢貌寢侻敬羽貌寢甚又南史闕寢小北史邢遜傳云祖效貌寢有風尚闕思風貌寢陋皆以侵為寢蓋循襲之誤闕作寢吹臺西清詩話云唐書杜甫傳云甫與李白高適同登吹臺慨然莫測也質之少陵昔游詩昔者與高李同登單父臺則知非吹臺三人皆詞宗果登吹臺豈無䧺詞傑唱著後世邪余謂此論太疎案杜子美遣懐詩云憶與高李輩論交入酒壚兩公壯藻思得我色敷腴氣酣登吹臺懐古視平蕪註云兩公高適李白也吹臺梁王歌臺也今謂之繁臺獨不見此何邪又名賢詩話云國初王仁裕暮春與門生五六人登繁臺飲酒題詩抵夜方散詩云柳隂如霧絮成堆又引門生上吹臺淑景即隨風雨去芳尊宜命管絃來漫誇鼎食鳴鐘貴寕免朝烏夜兎催爛醉也須詩一首不能空放馬頭回即知繁臺乃吹臺也豹直李濟翁資暇集云新官併宿本署曰爆直僉作爆迸之字余甞膺悶莫究其端近見惠郎中寔云舍作武豹字言豹性潔善服氣雖雪雨霜霧伏而不出慮汙其身案列女傳云南山有文豹霧雨七日不下食者欲以澤其毛衣而成其文章南華亦云豹棲於山林伏於岩穴靜也則併宿公署雅是豹伏之義宜作豹直固不疑也余觀宋景文公有和龎相公聞余儤直見寄詩一篇乃用儤字又職林云凡當直之法自給舍丞郎入者三直無儤自起居郎官入者五直一儤御史補闕入者七直兩儤其餘雜入者十直三儤亦用儤字案玉篇云儤連直也字當作儤非虎豹之豹靖康緗素雜記卷一
