body:
  text: 靖康緗素雜記卷八宋黃朝英撰摟羅酉陽雜俎云俗云摟羅因天寶中進士有東西堋各有聲勢稍窘者多會于酒摟食畢羅故有此語豫讀梁元帝風人辭云城頭網雀摟羅人首則知摟羅之言起已多時一云城頭網張雀摟羅會人著又蘇鄂演義云摟羅幹了之稱也俗云騾之大者曰摟騾騾羅聲相近非也又云婁敬甘羅亦非也蓋摟者攬也羅者綰也言人善當荷幹辦了事者遂謂之摟羅摟字從手旁作婁爾雅云婁聚也此說近之然南史顧歡傳云蹲夷之儀婁羅之辨又談苑載朱貞白詩云太婁羅乃止用婁羅字又五代史劉銖傳云諸君可謂僂儸兒矣乃加人焉阿奴晉書周顗傳云顗弟嵩嘗因酒瞋目謂顗曰君才不及弟何乃橫得重名以所然蠟燭投之顗神色無忤徐曰阿奴火攻固出下策耳又案絡秀傳云嘗冬至置酒絡秀舉觴謂三子曰吾本渡江託足無所不謂爾等並貴列吾目前吾復何憂嵩起曰恐不如尊旨伯仁志大而才短名重而識暗好乘人之弊此非自全之道嵩性抗直亦不容于世唯阿奴碌碌當在阿毋目下耳阿奴謨小字也觀世說所載正與此同注云阿奴周謨也然則投燭之事當云阿嵩火攻固出下策耳其稱阿奴蓋史誤也顗嵩俱為王敦所殺謨終丹陽尹摸索劉夢得嘉話云許敬宗性輕傲見人多忘或謂之不聰敬宗曰卿自難記若遇何劉沈謝暗中摸索著亦可識之而東坡雜記又云徐陵多忘每不識人人以此咎之陵曰公自難識若曹劉沈謝輩暗中摸索亦合認得斯二說大同小異然徐陵南朝人不知東坡得之于何書或云非東坡議論案梁書何遜劉孝綽並見重于世世謂之何劉又沈約謝朓亦有詩名朓從月不從目故字𤣥暉故世祖論云多而能者沈約少而能者謝朓何遜杜少陵醉歌曰何劉沈謝力未工皆用何劉沈謝而雜記乃以敬宗為徐陵何劉為曹劉錯雜如此益知非東坡之說醞藉漢書薛廣德傳云溫雅有醞藉顔師古注云醖言如醖釀也藉言有所薦藉也又云寬博有餘也醖于問切藉才夜切或用藴字而蘇鶚演義云藴藉者人雅度之稱也蘊者蓄也藉者籍也籍者積也言蓄美積德之謂乃引陸賈傳云聲名籍甚謂積纍聲名之多也或曰聲名籍甚謂狼籍甚盛也蘇鶚解狼籍者物雜亂之貌狼謂豺狼也籍者藉也言狼起卧游戲多藉其草而草皆雜亂遂成狼藉之名藉為籍者遂其語順也臺烏漢書朱博傳云御史府史舍百餘區井水皆竭又其府中列柏樹常有野烏數千棲宿其上晨去暮來號朝夕烏烏去不來者數月長老異之及觀顔氏家訓乃云漢書御史府中列柏樹常有野鳥數千棲宿其上晨去暮來號朝夕鳥而文士誤作烏鳶用之余案白氏六帖與李濟翁資暇集其餘簡編所載及人所引用皆以為烏鳶而獨家訓以為不然何哉余所未喻鴝鵒字說鴝從勾鵒從欲解云鴝鵒多欲尾而足勾焉余少時讀字說而不解其義後因看段成式酉陽雜俎云鴝鵒交時以足相勾促鳴如鼓翼相鬭狀往往墮地人或就將掩之取其勾足為魅藥今觀鴝鵒羣集木上其間或有雙墮地者以是驗成式之言果不妄而舒王于百家小說之書無所不取也唐耜注字說但云鳥名引考工記曰鸜鵒不踰濟而已其它無義蓋唐公亦未見段成式之說鞦韆許愼說文後序徐注云案詞人高無際作秋千賦序云秋千漢武帝後庭之戲也本云千秋祝夀之詞也語訛轉為秋千後人不知本意乃旁始加革為秋千字案秋千非皮革所為又非車馬之用不合從革又古今藝術曰秋千北方戎戲以習輕趫又開元遺事云天寶宫中至寒食節皆戲秋千令宫嬪輩以為燕樂帝呼為半仙之戲都下士民因而呼之揚州唐李濟翁嘗謂揚州者以其土俗輕揚故名其州今作楊柳之楊謬也又沈存中筆談云豫奉使至古契丹界見大薊樹如車蓋中國無此大者其地名薊恐其因此也如楊州宜楊荆州宜荆之類余案古本尚書及太史公記班固漢書所載淮海惟揚州並無作楊字者乃知濟翁所論為得經意而存中之說謬矣靖康緗素雜記卷八
