body:
  text: 靖康緗素雜記雜家類二雜考之屬提要臣等謹案靖康緗素雜記十卷宋黃朝英撰朝公武讀書志曰朝英建州人紹聖後舉子又曰所記凡二百事今本卷數與公武所記同而秖有九十事程大昌演繁露辨其誤引麥秋一條此本無之考王楙野客叢書亦具載麥秋之說稱緗素雜記知非大昌誤引又野客叢書載其辨李賀金銅仙人辭漢歌序誤以拆露盤為青龍九年一條麻胡僅得二事一條袁文甕牖間評載其辨穀陽一條辨蘆蔔一條此本亦無之蓋明人妄有刪削已非完書矣袁文王楙於此書頗有駁正然考證之學大抵後密於前不足為病朝公武譏其為王安石之學又譏其解詩芍藥握椒為鄙䙝劉敞七經小𫝊亦托此條為諧笑雖不出姓字殆亦指朝英觀其書頗引新經義及字說而尊王安石為舒王解詩緑竹一條於安石之說尤委曲回護誠為王氏之學者然所說自芍藥握椒一條外大抵多引據詳明皆有資考證固非漫無根柢徒為臆斷之談敞本與安石異趣公武又以元祐黨家世與新學相攻擊故特托其最謬一條以相排抑耳乾隆四十六年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d1685f3ba6645f4c4265b2e8d817c2cc5861d2eaa6b18310e01175c04e172569
