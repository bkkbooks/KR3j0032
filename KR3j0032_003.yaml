body:
  text: 靖康緗素雜記卷三宋黃朝英撰湖隂唐溫庭筠嘗補古樂府湖隂詞其序云王敦舉兵至湖隂明帝微行視其營伍由是樂府有湖隂曲而亡其詞因附之云云按晉書王敦傳云敦至蕪湖上表又云帝將討敦微服至蕪湖察其營壘又司徒導與王含書曰大將軍來屯于湖明帝紀云敦下屯于湖又周琦傳云王敦軍敗於于湖又甘卓進爵于湖侯又王允之鎮于湖案晉書地理志丹陽郡統縣十二有蕪湖縣讀史者當以帝微行至于湖為斷句謂之微行則隂察其營壘可知不當云湖隂也然則古樂府之命名既失之矣而庭筠當改曰于湖曲乃為允當其湖隂詞云祖龍黃鬚珊瑚鞭鐵驄金面青連錢謂明帝為祖龍又誤也蓋史記載始皇為祖龍者祖始也龍者人君之象也以其自號始皇故謂之祖龍耳其它安可稱乎雲夢筆談云舊尚書云雲夢土作乂本朝太宗時得古本尚書作雲土夢作乂詔改禹貢從古本案孔安國注雲夢之澤在江南不然也據左傳吳人入郢楚子涉睢濟江入于雲中王寢盜攻之以戈擊王王奔鄖楚子自郢西走涉睢則當出于江南其後涉江入于雲中遂奔鄖鄖則今之安州涉江而後至雲入雲然後至鄖則雲在江北也左傳曰鄭伯如楚子産相楚子享之既享子産乃具田備王以田江南之夢杜預注云楚之雲夢跨江南北曰江南之夢則雲在江北明矣元豐中有郭思者能言漢沔間地理亦以謂江南為夢江北為雲豫以左傳驗之思之説信然余案漢高祖用陳平謀偽遊於雲夢注家無解釋又爾雅云楚有雲夢注云今南郡華容縣東南也丘湖是也恐為未當耳孫惠紀云上造以上及內外公孫耳孫有罪當刑應劭云耳孫者玄孫之子也言去其曾高益逺但耳聞之也李斐曰耳孫曾孫也晉灼曰耳孫玄孫之曾孫也諸矦王表在八世顔氏曰耳孫諸説不同據平紀及諸矦王表説梁孝王玄孫之子耳孫耳音仍又胸奴傳説握衍朐鞮單于云烏單于耳孫以此察之李云曾孫是也然漢書諸處又皆云曾孫非一不應雜兩稱而言據爾雅曾孫之子為玄孫玄孫之子為來孫來孫之子為昆孫昆孫之子為仍孫從己而數是為八葉則與晉説相同仍耳相近蓋一號也但班氏唯存古名而計其葉數則錯也上造秦第二爵名曰應劭以為第十六誤矣又以耳孫音耳有耳聞之義又其謬戾如此蓴羮晉陸機詣王武子武子前有羊酪指示陸曰卿吳中何以敵此陸曰千里蓴羮末下一作未下鹽䜴所載此而已及觀世説又曰千里蓴羮但未下鹽䜴耳或以為千里末下皆地名是未嘗讀世説而妄為之説也或以為千里者言其地之廣是蓋不思之甚也如以千里為地之廣則當云蓴菜不當云羮也或以為蓴羮不必鹽䜴乃得其真味故云未下鹽䜴是又不然蓋洛中去吳有千里之逺吳中蓴羮自可敵羊酪但以其地逺未可猝致耳故云但未下鹽䜴耳意謂蓴羮得鹽䜴尤美也此言近之矣今詢之吳人信然又沈文季謂崔祖思曰千里蓴羮豈關魯衛齊高帝曰蓴羮故應還沈蓋文季吳人也子美詩曰我思岷下芋君思千里蓴張巨山詩曰一出修門道重嘗末下蓴二公以千里末下為地名今詳陸答語千里蓴羮末下鹽䜴蓋舉二地所出之物以敵羊酪今以地有千里之逺但未下鹽䜴何支離也軒渠後漢薊子訓傳云兒識父母軒渠笑悅欲往就之音義無解釋以意測之蓋軒渠者欲舉其身體以就父母之狀案字説軒上下渠一直一曲受衆小水將達而不購也軒渠之義如此而東坡書魯直草書後云他日黔安見之當捧腹軒渠也恐引此軒渠於義未安近世文士頌其人云少而渠振發亦未為穩當唯世説載會稽王軒軒如朝霞之欲舉唐史乃用其語云神氣軒舉舒王詩義云仙仙軒舉之狀乃為盡善宋子京為皇從姪孫撰石記云生二嵗軒渠有識矣病篤而夭又撰王文公墓志云公即何夫人之子軒渠卓異魯公曰是天吾門八嵗終二喪斬焉致毁是真得漢書之意婪尾蘇鶚演義云今人以酒巡匝為啉尾即再命其爵也云南朝有異國進貢藍牛其尾長三丈一云藍穎水其尾三丈時人倣之以為酒令今兩盞從其簡也此皆非正行酒巡匝即重其盞蓋慰勞其得酒在後也又云啉者貪也謂處於座末得酒最晚腹癢於酒既得酒巡匝更貪婪之故曰啉尾啉字從口足明貪婪之意此説近之余觀宋景文公守嵗詩云迎新送故只如此且盡燈前婪尾杯又云稍倦持螯手猶殘婪尾觴又東坡寒食詩云藍尾忽驚新火後遨頭要及浣花前注引樂天寒食詩云三杯藍尾酒一揲膠牙餳乃用藍字蓋婪藍一也白波景文公詩云鏤管喜傳吟處筆白波催卷醉時杯讀此詩不曉白波事及觀資暇集云飲酒之卷白波蓋起於東漢既禽白波賊戮之如卷席然故酒席倣之以快人情氣也疑出於此余恐其不然蓋白者罰爵之名飲有不盡者則以此爵罰之故班固敘傳云諸侍中皆引滿舉白左太沖吳都賦云飛觴舉白注云行觴疾如飛也大白杯名又魏文矦與大夫飲酒令曰不釂者浮以大白於是公乘不任舉白浮君所謂卷白波者蓋卷白上之酒波耳言其飲酒之快也故景文公以白波對鏤管者誠有謂焉案漢書黃巾餘黨復起西河白波谷號曰白波賊衆十餘萬五松史記載秦始皇遂上泰山立石封祀祠下風雨暴至休於樹下遂封其樹為五大夫墠梁父刻所立石蓋五大夫者秦官名第九爵也唐陸贄作禁中春松詩云不羡五株封案史記但云封其樹為五大夫不聞有五株松之説而贄云爾者何耶然贄博極羣書不當有誤恐有所據而云然也或曰循襲之誤耳所未詳也又李商隱有五松驛詩云獨下長亭念過秦五松不見見輿薪只應既斬斯高後尋被樵人用斧斤而商隱亦謂五松如何又李白送人遊桃源序云登封太山風雨暴作雖五松受職草木有知而萬象乖度禮刑將弛然太白亦以謂五松也唯舒王詠柏詩云老松先得大夫官乃為切當倚卓今人用倚卓字多從木旁殊無義理字書從木從奇乃椅字於宜切詩曰其桐其椅是也從木從卓乃棹字直教切所謂棹船為郎是也倚卓之字雖不經見以鄙意測之蓋人所倚者為倚卓之在前者為卓此言近之矣何以明之淇奧曰猗重較兮新義謂猗倚也重較者所以為愼固也由是知人所倚者為倚論語曰如有所立卓爾説者謂聖人之道如有所立卓然在前也由是知卓之在前者為卓故楊文公談苑有云咸平景德中主家造檀香倚卓一副未嘗用椅棹字始知前輩何嘗謬用一字也思恭歐陽五代史作拓跋思敬意謂薛史避國諱耳按舊唐書實録皆作思恭實録天復二年九月武定軍節度使李思敬以城降王建思敬本姓拓跋鄜夏節度使思恭保大節度使思孝之弟也思孝致仕以思敬為保大留後遂升節度又徙武定軍新唐書黨項傳曰思孝為定難節度使卒弟思諫代為節度使思孝為保大節度以孝薦弟思敬為保大留後俄為節度使然則思恭思敬乃是兩人思敬後附李茂貞因賜國姓故更姓李文忠公合為一人誤也靖康緗素雜記卷三
